<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">

<body>
<header>
    <h1>It tech</h1>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>
</header>
<main>
        <h2>Contacto</h2>
        <p>Completá el siguiente formulario y nos pondremos en contacto a la brevedad.</p>
        
        <form>
            <label for="nombre">Nombre y Apellido:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required>

            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" rows="5" placeholder="¿En qué podemos ayudarte?" required></textarea>

            <button type="submit">Enviar Consulta</button>
        </form>

        <section style="margin-top: 30px;">
            <h3>Otros medios</h3>
            <p>Email: contacto@ittech.com</p>
            <p>Teléfono: +54 11 1234-5678</p>
        </section>
    </main>
<footer>
        <p>&copy; 2026 IT Tech - Grupo 13</p>
    </footer>
</body>
</html>
